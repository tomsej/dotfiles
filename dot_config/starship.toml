add_newline = true
# Global command timeout to prevent hanging (improves performance)
command_timeout = 500

# A minimal left prompt
format = """
$directory\
$git_branch\
$git_status\
$fill\
$package\
$python\
$nodejs\
$golang\
$aws\
$jobs\
$cmd_duration\
$line_break\
$character"""

palette = "catppuccin_mocha"
# Disable right_format to avoid scanning all modules
# right_format was using $all which scans 30+ modules on every prompt!
right_format = ""

[directory]
style = 'bold fg:mauve'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = '‚Ä¶/'
truncate_to_repo = false

[character] # The name of the module we are configuring is 'character'
success_symbol = '[‚ûú](bold green)'        # The 'success_symbol' segment is being set to '‚ûú' with the color 'bold green'
vimcmd_symbol = '[V](bold blue)'
error_symbol = '[‚úó](bold red)'
vimcmd_visual_symbol = '[v](bold purple)'

[git_branch]
style = 'fg:green'
symbol = 'Ôêò '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
format = '[(\[$all_status$ahead_behind\] )](bold bright-yellow)'
conflicted = '=${count}'
ahead = '‚á°${count}'
behind = '‚á£${count}'
diverged = '‚áï‚á°${ahead_count}‚á£${behind_count}'
untracked = '?${count}'
stashed = '‚â°${count}'
modified = '!${count}'
staged = '+${count}'
renamed = '¬ª${count}'
deleted = '‚úò${count}'
# Disable in repos with many untracked files for better performance
disabled = false
# Faster git status check
ignore_submodules = true

[fill]
symbol = ' '

[package]
format = '‚ó¶ [$symbol$version]($style) '
symbol = "Ó¨© "
style = "bold yellow"
# Only show in specific directories to improve performance
disabled = false

[python]
style = 'sky'
symbol = 'Óàµ '
format = '‚ó¶ [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = false

[lua]
disabled = true

[haskell]
disabled = true

[ruby]
disabled = true

[rust]
disabled = true

[aws]
symbol = 'Ôâ∞ '
style = 'peach'
format = '‚ó¶ [$symbol($profile )(\[$duration\] )]($style)'

[docker_context]
disabled = true

[jobs]
symbol = 'ÔÄì '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
