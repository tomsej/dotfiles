# ─────────────────────────────
# 🎨 UI & Appearance
# ─────────────────────────────

# Catppuccin Mocha theme (inline to match Ghostty)
include catppuccin-mocha.conf

# Override background to match Ghostty
background #16131E

font_family      JetBrainsMono Nerd Font Mono
font_size        12
scrollback_lines 10000000

# Cursor
cursor           #FFD86B
cursor_text_color background
cursor_beam_thickness 2

# Tab bar
tab_bar_style       powerline
tab_powerline_style slanted
tab_title_template  "{index}: {title}"

# ─────────────────────────────
# 📋 Clipboard
# ─────────────────────────────

clipboard_control write-clipboard read-clipboard

# ─────────────────────────────
# 🪟 Window & Layout
# ─────────────────────────────

enabled_layouts splits,stack
window_padding_width 0 10 10 10
remember_window_size yes
hide_window_decorations no
macos_titlebar_color background

# Split divider color to match Ghostty
active_border_color   #241c39
inactive_border_color #241c39

# Dim inactive splits so active one stands out
inactive_text_alpha 0.5

# ─────────────────────────────
# 💻 Shell & Environment
# ─────────────────────────────

startup_session none

# ─────────────────────────────
# 🧠 Usability & Behavior
# ─────────────────────────────

# Remote control (needed for ws workspace switcher)
allow_remote_control yes
listen_on unix:/tmp/kitty-{kitty_pid}

detect_urls yes
url_style curly
open_url_modifiers cmd
mouse_map cmd+left click ungrabbed mouse_click_url_or_select
confirm_os_window_close 0



# Shell integration (marks at each prompt, jump between commands)
shell_integration enabled

# macOS specific
macos_option_as_alt left
macos_quit_when_last_window_closed no

# ─────────────────────────────
# ⌨️ Keybindings
# ─────────────────────────────

# Czech keyboard: Option+key special characters (left alt passthrough)
# Number row
map alt+ě send_text all @
map alt+š send_text all #
map alt+č send_text all $
map alt+ř send_text all ~
map alt+ž send_text all ^
map alt+ý send_text all &
map alt+á send_text all *
map alt+í send_text all {
map alt+é send_text all }
# Brackets, angle brackets, backtick
map alt+ú send_text all [
map alt+) send_text all ]
map alt+, send_text all <
map alt+. send_text all >
map alt++ send_text all `

# Tabs: Czech keyboard (number row produces +ěščřžýáíé)
map cmd+plus goto_tab 1
map cmd+ě goto_tab 2
map cmd+š goto_tab 3
map cmd+č goto_tab 4
map cmd+ř goto_tab 5
map cmd+ž goto_tab 6
map cmd+ý goto_tab 7
map cmd+á goto_tab 8
map cmd+í goto_tab 9

# Tab navigation
map cmd+h previous_tab
map cmd+l next_tab

# Move tab left/right
map cmd+shift+h move_tab_backward
map cmd+shift+l move_tab_forward

# Rename tab / reload config
map cmd+r set_tab_title
map cmd+shift+r load_config_file

# Focus visible window/split picker
map alt+p focus_visible_window

# Scroll: cmd+j/k (vim-style)
map cmd+j scroll_page_down
map cmd+k scroll_page_up

# Close split (or tab if last split, or window if last tab)
map cmd+w close_window

# Close tab
map cmd+q close_tab

# Quit kitty
map cmd+shift+q quit

# Splits: cmd+d / cmd+shift+d (iTerm2-style)
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current

# Navigate splits: alt+hjkl (vim-style directional)
map alt+h neighboring_window left
map alt+l neighboring_window right
map alt+j neighboring_window bottom
map alt+k neighboring_window top

# Zoom split: alt+f
map alt+f toggle_layout stack

# Resize splits: alt+shift+hjkl
map alt+shift+h resize_window narrower 3
map alt+shift+l resize_window wider 3
map alt+shift+j resize_window taller 3
map alt+shift+k resize_window shorter 3

# Rotate/reorganize splits
map ctrl+shift+i layout_action rotate

# Cycle through layouts (splits → stack → tall → fat → grid)
map ctrl+shift+l next_layout

# Copy last command output
map cmd+e show_last_command_output

# Clear scrollback + screen
map cmd+shift+k clear_terminal scrollback

# Search scrollback
map ctrl+shift+f show_scrollback

# Hints: select URLs, paths, hashes from screen
map ctrl+shift+e open_url_with_hints

# Open GitHub repo in Safari (ctrl+shift+o)
map ctrl+shift+o launch --type=background --cwd=current sh -c 'url=$(git remote get-url origin 2>/dev/null) && url=$(echo "$url" | sed "s|git@github.com:|https://github.com/|;s|\.git$||") && open -a Safari "$url"'

# Open current folder in VS Code (ctrl+shift+p)
map ctrl+shift+p launch --type=background --cwd=current code .
