# =============================================
# dmux recommended tmux config
# Theme: dark
# Generated by dmux onboarding
# =============================================

# Better support for Ctrl+Shift arrow bindings on newer tmux versions
set -gq extended-keys on
# Pi (pi-coding-agent) prefers csi-u encoding
set -g extended-keys-format csi-u

# Pane visuals
set -g pane-border-format ' #[bold]#P #[default]#{?pane_title,#{pane_title},#{pane_current_command}} '
set -g pane-border-status off
# Let terminal background pass through (no pane bg override)
# Inactive/active distinction via border color only.
set -g window-style 'default'
set -g window-active-style 'default'
set -g pane-border-style 'fg=#45475a,bg=default'
set -g pane-active-border-style 'fg=#89b4fa,bg=default'

# Status bar (catppuccin mocha)
set -g status-style 'fg=#cdd6f4,bg=#181825'
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80
# Left: session name + aoe context (if inside aoe session)
set -g status-left '#[fg=#89b4fa,bold] #S #[fg=#6c7086]│ '
# Window list: active in blue, others dim
setw -g window-status-format '#[fg=#6c7086] #I:#W '
setw -g window-status-current-format '#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W '
setw -g window-status-separator ''
# Right: pane title + time
set -g status-right '#[fg=#a6adc8]#{=30:pane_title} #[fg=#6c7086]│ #[fg=#f9e2af]%H:%M '

# ======================================================================
# Vim-style ergonomics
# ======================================================================

# Prefix: Ctrl+a (easier than Ctrl+b). Double-tap = send literal C-a.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 1-indexed windows/panes (matches keyboard number-row)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi keys in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Reload config
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf reloaded'

# Splits (CZ-friendly): s = side-by-side (vertical split), i = stacked (horizontal split)
# Keep default | and - as aliases for muscle memory.
unbind '"'
unbind %
bind s split-window -h -c '#{pane_current_path}'
bind i split-window -v -c '#{pane_current_path}'
bind '|' split-window -h -c '#{pane_current_path}'
bind '-' split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# Quick kill
bind q kill-pane
bind Q kill-window

# hjkl pane navigation (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# HJKL pane resize (repeatable — hold within repeat-time)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window switch
bind -r n next-window
bind -r p previous-window
bind Tab last-window

# Fast pane navigation without prefix (legacy binding kept)
bind -n C-S-Left select-pane -L
bind -n C-S-Right select-pane -R
bind -n C-S-Up select-pane -U
bind -n C-S-Down select-pane -D

# Mouse ON but drag-select disabled — scroll & click work, accidental
# selection on pane-switch eliminated.  Manual copy-mode via prefix+[
set -g mouse on
set -g set-clipboard on
set -gq allow-passthrough all

# Toggle mouse capture on/off (handy for resize-by-drag or tmux copy-mode scroll)
bind M set -g mouse \; display-message 'mouse: #{?mouse,on,off}'

# Copy selected text to system clipboard (best effort by platform)
if-shell "command -v pbcopy >/dev/null 2>&1" "bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell "command -v pbcopy >/dev/null 2>&1" "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'"
if-shell "command -v wl-copy >/dev/null 2>&1" "bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'"
if-shell "command -v wl-copy >/dev/null 2>&1" "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'"
if-shell "command -v xclip >/dev/null 2>&1" "bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"
if-shell "command -v xclip >/dev/null 2>&1" "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'"

# Terminal passthrough improvements (Ghostty/kitty)
set -ga terminal-overrides ',xterm-256color:Ms=\E]52;c;%p2%s\007'
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Preserve terminal program info inside tmux
set -ga update-environment "TERM_PROGRAM"

# agent-deck configuration
# agent-deck-tmux-config-version: 3
# Added by agent-deck installer - 2026-04-17
# https://github.com/asheshgoplani/agent-deck

# Terminal with true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:Tc:smcup@:rmcup@"
set -ag terminal-overrides ",*256col*:Tc"
# Force truecolor for all terminals (fix washed colors in TUIs like agent-of-empires)
set -as terminal-features ",*:RGB"
set -ag terminal-overrides ",*:Tc"

# Performance
set -sg escape-time 0
set -g history-limit 50000

# Extended keys: forward Shift+Enter and other modified keys to apps (tmux 3.2+)
set -s extended-keys on
set -as terminal-features 'tmux-256color:extkeys'

# Mouse support disabled above — terminal handles scroll/select natively.
# (agent-deck's original mouse/scroll bindings kept below for copy-mode when
# mouse is toggled back on via prefix+M.)

# Scroll bindings in copy-mode (both vi and emacs modes)
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind-key -T copy-mode WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode WheelDownPane send-keys -X scroll-down

# Clipboard integration (drag-to-copy)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
# End agent-deck configuration

# Disable mouse drag selection — prevents accidental select on pane switch
unbind -T copy-mode MouseDrag1Pane
unbind -T copy-mode-vi MouseDrag1Pane

